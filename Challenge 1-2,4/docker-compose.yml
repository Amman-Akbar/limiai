services:
  ai-service:
    build: .
    container_name: ai-service
    ports:
      - "9000:9000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
